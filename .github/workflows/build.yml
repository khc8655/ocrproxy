name: Build Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: llm-proxy:test

      - name: Test container starts
        run: |
          docker run -d --name test-proxy \
            -e ENCRYPT_KEY="rXGY3aVOs22PNwwj69PudHmGM3fCloipuHl7tMDmeZY=" \
            -e PROXY_API_KEY="test-key" \
            -e ADMIN_PASSWORD="test-pass" \
            -p 7860:7860 \
            llm-proxy:test
          # 最多等 15 秒，每秒探一次；失败就 dump 容器日志
          for i in $(seq 1 15); do
            if curl -sf http://localhost:7860/healthz > /dev/null 2>&1; then
              echo "✓ healthz OK after ${i}s"
              docker stop test-proxy >/dev/null
              exit 0
            fi
            sleep 1
          done
          echo "✗ container did not become healthy in 15s"
          echo "=== docker logs ==="
          docker logs test-proxy
          docker stop test-proxy >/dev/null 2>&1 || true
          exit 7

      - name: Push to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
